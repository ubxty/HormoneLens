<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Hormone Defense — Defend your hormonal balance from disruptors. A HormoneLens mini-game.">
    <title>🚀 Hormone Defense | HormoneLens</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // Prevent parent page from scrolling while the game is active
        (function () {
            var keys = [32, 37, 38, 39, 40]; // Space, Left, Up, Right, Down
            function lock(e) {
                if (keys.includes(e.keyCode)) {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }
            document.addEventListener('keydown', lock, { passive: false });
            document.addEventListener('wheel',   function(e){ e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });

            // Tell parent page we are active so IT can lock scroll too
            window.addEventListener('focus', function () {
                try { window.parent.postMessage({ type: 'GAME_FOCUS' }, '*'); } catch(e) {}
            });
            window.addEventListener('blur', function () {
                try { window.parent.postMessage({ type: 'GAME_BLUR' }, '*'); } catch(e) {}
            });
        })();
    </script>

    <script src="utils/responsiveScale.js"></script>
    <script src="scenes/BootScene.js"></script>
    <script src="scenes/PreloadScene.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="scenes/UIScene.js"></script>
    <script src="scenes/ResultScene.js"></script>
    <script src="main.js"></script>
</body>
</html>
