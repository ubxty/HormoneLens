<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Hormone Defense — Defend your hormonal balance from disruptors. A HormoneLens mini-game.">
    <title>🚀 Hormone Defense | HormoneLens</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // Notify parent page about focus so it can lock its own scroll
        (function () {
            window.addEventListener('focus', function () {
                try { window.parent.postMessage({ type: 'GAME_FOCUS' }, '*'); } catch(e) {}
            });
            window.addEventListener('blur', function () {
                try { window.parent.postMessage({ type: 'GAME_BLUR' }, '*'); } catch(e) {}
            });
            // Prevent wheel/touch scroll (no page scroll inside game iframe)
            document.addEventListener('wheel', function(e){ e.preventDefault(); }, { passive: false });
            document.addEventListener('touchmove', function(e){ e.preventDefault(); }, { passive: false });
        })();
    </script>

    <script src="utils/responsiveScale.js"></script>
    <script src="scenes/BootScene.js"></script>
    <script src="scenes/PreloadScene.js"></script>
    <script src="scenes/MenuScene.js"></script>
    <script src="scenes/GameScene.js"></script>
    <script src="scenes/UIScene.js"></script>
    <script src="scenes/ResultScene.js"></script>
    <script src="main.js"></script>
</body>
</html>
